<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Retenly | QA для продаж и поддержки</title>

<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;600;700;800&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>

:root{
--bg:#f5f8fc;
--card:#ffffff;
--text:#0e1726;
--muted:#61708d;
--line:rgba(15,23,42,0.09);
--gold:#f4d27a;
--gold-deep:#d39a3e;
--violet:#6b7cff;
--shadow:0 20px 45px rgba(16,24,40,0.08);
--head:"Plus Jakarta Sans", Manrope, system-ui, sans-serif;
--body:Manrope, system-ui, sans-serif;
}

*{box-sizing:border-box}

body{
margin:0;
font-family:var(--body);
background:#f7f9fc;
color:var(--text);
}

/* HERO */

.hero{
padding:120px 20px 90px;
text-align:center;
max-width:900px;
margin:auto;
}

.hero h1{
font-family:var(--head);
font-size:54px;
line-height:1.15;
font-weight:800;
letter-spacing:-0.02em;
margin-bottom:28px;
}

.hero h1 span{
display:block;
}

.hero p{
font-size:18px;
color:var(--muted);
margin-bottom:40px;
}

.hero-btn{
display:inline-block;
padding:16px 34px;
font-weight:800;
font-size:18px;
border-radius:40px;
background:linear-gradient(135deg,#f4d27a,#d39a3e);
color:#111;
text-decoration:none;
box-shadow:0 10px 25px rgba(211,154,62,.35);
animation:pulse 2.6s infinite;
transition:.25s;
}

.hero-btn:hover{
transform:translateY(-2px);
box-shadow:0 16px 32px rgba(211,154,62,.45);
}

/* animation */

@keyframes pulse{
0%{box-shadow:0 0 0 0 rgba(211,154,62,.55);}
70%{box-shadow:0 0 0 14px rgba(211,154,62,0);}
100%{box-shadow:0 0 0 0 rgba(211,154,62,0);}
}

/* DASHBOARD */

.dashboard{
max-width:900px;
margin:70px auto 0;
border:1px solid var(--line);
border-radius:20px;
background:white;
box-shadow:var(--shadow);
padding:30px;
}

.dashboard-head{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
font-weight:700;
font-size:14px;
color:var(--muted);
}

.dashboard-title{
font-weight:800;
font-size:16px;
}

.dashboard-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
}

.card{
border:1px solid var(--line);
border-radius:16px;
padding:18px;
background:#fff;
}

.card h3{
margin:0 0 10px;
font-size:16px;
}

.metric{
font-size:28px;
font-weight:800;
}

.metric.good{color:#17b26a}
.metric.bad{color:#ef4444}

</style>
</head>

<body>

<section class="hero">

<h1>
<span>Перестаньте терять клиентов.</span>
<span>Контролируйте качество коммуникаций</span>
</h1>

<a href="#contact" class="hero-btn">
Получить бесплатный аудит
</a>

</section>


<section class="dashboard">

<div class="dashboard-head">
<div class="dashboard-title">QA Dashboard</div>
<div>Weekly Report</div>
</div>

<div class="dashboard-grid">

<div class="card">
<h3>Конверсия звонков</h3>
<div class="metric good">+18%</div>
</div>

<div class="card">
<h3>Ошибки скрипта</h3>
<div class="metric bad">12</div>
</div>

<div class="card">
<h3>Средний QA score</h3>
<div class="metric">82 / 100</div>
</div>

<div class="card">
<h3>Потерянные сделки</h3>
<div class="metric bad">9</div>
</div>

</div>

</section>

</body>
</html>
